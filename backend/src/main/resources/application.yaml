spring:
  application:
    name: backend
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ZITADEL_ISSUER_URI:http://localhost:8080}

zitadel:
  management-api-url: ${ZITADEL_MANAGEMENT_API_URL:http://localhost:8080}
  service-account-token: ${ZITADEL_SERVICE_ACCOUNT_TOKEN:}
  goaldone:
    project-id: ${ZITADEL_GOALDONE_PROJECT_ID:}

server:
  servlet:
    context-path: /api/v1
