spring:
  application:
    name: backend
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ZITADEL_ISSUER_URI:https://sso.dev.goaldone.de}

zitadel:
  service-account-token: ${ZITADEL_SERVICE_ACCOUNT_TOKEN:}
  goaldone:
    project-id: ${ZITADEL_GOALDONE_PROJECT_ID:}
    org-id: ${ZITADEL_GOALDONE_ORG_ID:}

server:
  forward-headers-strategy: framework
  servlet:
    context-path: /api/v1

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
