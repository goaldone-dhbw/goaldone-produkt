spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.DataRedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.LettuceConnectionConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    # H2 in-memory database for local development
    # Alternative: jdbc:h2:file:./target/auth_session for file-based storage
    url: jdbc:h2:mem:auth_dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  h2:
    console:
      enabled: true
      path: /h2-console

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
      table-name: SPRING_SESSION

logging:
  level:
    de.goaldone: DEBUG
    org.springframework.security: DEBUG
    org.springframework.session: DEBUG
    org.springframework.web: DEBUG
