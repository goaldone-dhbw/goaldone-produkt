<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Einladungsfehler - Goaldone</title>
</head>
<body>
<div layout:fragment="content">
    <div style="background: #fff3cd; border-left: 4px solid #ffc107; padding: 20px; border-radius: 6px; margin: 20px 0;">
        <h2 th:text="${errorCode == 'EXPIRED'} ? 'Einladung abgelaufen' : (${errorCode == 'INVALID'} ? 'Ungültige Einladung' : 'Fehler')">Fehler</h2>
        <p th:text="${message}">Ein Fehler ist aufgetreten.</p>
        <p th:if="${supportContact}">
            Bitte kontaktieren Sie uns unter: <a th:href="'mailto:' + ${supportContact}" th:text="${supportContact}"></a>
        </p>
        <a href="/" style="display: inline-block; margin-top: 15px; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 4px;">Zur Startseite</a>
    </div>
</div>
</body>
</html>
