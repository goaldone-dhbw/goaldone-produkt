<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Passwort erstellen - Goaldone</title>
    <style>
        .form-section {
            max-width: 500px;
            margin: 0 auto;
        }
        .progress-indicator {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        .org-context {
            background: #e7f3ff;
            border-left: 4px solid #007bff;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 24px;
        }
        .org-context p {
            margin: 5px 0;
            font-size: 14px;
        }
        .org-context strong {
            color: #0056b3;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }
        .password-requirements {
            background: #fff8dc;
            border: 1px solid #f5e6c8;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #666;
        }
        .password-requirements ul {
            margin: 8px 0 0 20px;
            padding: 0;
        }
        .password-requirements li {
            margin: 4px 0;
        }
        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="form-section">
        <h2>Konto erstellen</h2>
        
        <div class="progress-indicator">
            Schritt 2 von 2: Passwort erstellen
        </div>

        <div class="org-context">
            <p><strong>Willkommen bei Goaldone!</strong></p>
            <p th:if="${organizationName}">Du beitrittst der Organisation: <strong th:text="${organizationName}"></strong></p>
            <p th:if="${roleName}">Deine Rolle: <strong th:text="${roleName}"></strong></p>
        </div>

        <div th:if="${error}" class="error-message">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/invitation/set-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
            
            <div class="form-group">
                <label class="form-label">E-Mail-Adresse</label>
                <input type="text" class="form-input" th:value="${email}" disabled>
            </div>

            <div class="password-requirements">
                <strong>Passwort-Anforderungen:</strong>
                <ul>
                    <li>Mindestens 12 Zeichen</li>
                    <li>Mindestens ein Großbuchstabe (A-Z)</li>
                    <li>Mindestens ein Kleinbuchstabe (a-z)</li>
                    <li>Mindestens eine Zahl (0-9)</li>
                </ul>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Neues Passwort</label>
                <input type="password" id="password" name="password" class="form-input" required minlength="12">
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Passwort wiederholen</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" required minlength="12">
            </div>

            <button type="submit" class="btn btn-primary">Konto erstellen & Aktivieren</button>
        </form>
    </div>
</div>
</body>
</html>
