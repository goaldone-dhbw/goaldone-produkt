<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Forgot Password - Goaldone</title>
</head>
<body>
<div layout:fragment="content">
    <h2>Forgot Password</h2>
    <p style="color: var(--text-muted); margin-bottom: var(--space-6);">Enter your email address and we'll send you a link to reset your password.</p>

    <div th:if="${message}" class="alert alert-info" style="margin-bottom: var(--space-6);">
        <p th:text="${message}" style="margin: 0;"></p>
    </div>

    <form th:action="@{/forgot-password}" method="post">
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-input" required placeholder="name@company.com">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
    </form>

    <div style="margin-top: var(--space-6); text-align: center;">
        <a th:href="@{/login}" style="color: var(--primary-500); text-decoration: none; font-size: 0.875rem;">Back to Login</a>
    </div>
</div>
</body>
</html>
