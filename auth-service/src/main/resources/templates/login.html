<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Sign In – GoalDone</title>
</head>
<body>
<div layout:fragment="content">
    <h2>Sign in to your account</h2>

    <!-- Error alert — invalid credentials -->
    <div th:if="${param.error}" class="alert alert-error" style="margin-bottom: var(--space-4);">
        <p style="margin: 0;">Invalid email or password. Please try again.</p>
    </div>

    <form th:action="@{/login}" method="post">
        <!-- Email / Username field -->
        <div class="form-group">
            <label for="username" class="form-label">Email or Username</label>
            <input type="text" id="username" name="username" class="form-input"
                   autofocus required style="width: 100%;">
        </div>

        <!-- Password field with visibility toggle -->
        <div class="form-group" style="position: relative;">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-input"
                   required style="width: 100%;">
            <button type="button"
                    onclick="togglePassword('password', this)"
                    style="position: absolute; right: 10px; top: 32px; background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-muted);"
                    aria-label="Show password">👁</button>
        </div>

        <!-- Forgot password link -->
        <div style="text-align: right; margin-bottom: var(--space-4);">
            <a th:href="@{/forgot-password}"
               style="color: var(--primary-500); font-size: 0.875rem; text-decoration: none;">
                Forgot your password?
            </a>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
    </form>
</div>
<th:block layout:fragment="scripts">
<script>
function togglePassword(fieldId, btn) {
    var input = document.getElementById(fieldId);
    var isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? '🙈' : '👁';
    btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
}
</script>
</th:block>
</body>
</html>
