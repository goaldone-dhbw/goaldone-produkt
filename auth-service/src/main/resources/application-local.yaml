spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.DataRedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.LettuceConnectionConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    enabled: true
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
