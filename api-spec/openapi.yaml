openapi: 3.0.3
info:
  title: GoalDone API
  description: API for the GoalDone task management application.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: health
    description: Health check operations
  - name: tasks
    description: Task management operations
  - name: user-accounts
    description: User Account operations
  - name: working-times
    description: Working time management
  - name: org-management
    description: Organization management operations
  - name: super-admin-management
    description: Super Admin management operations

paths:
  /health:
    get:
      tags:
        - health
      summary: Health Check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP

  /users/accounts/links/request:
    post:
      tags:
        - user-accounts
      summary: Request an account link token
      operationId: requestAccountLink
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Link token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkTokenResponse'

  /users/accounts/links/confirm:
    post:
      tags:
        - user-accounts
      summary: Confirm an account link
      operationId: confirmAccountLink
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkConfirmRequest'
      responses:
        '204':
          description: Linked successfully
        '409':
          description: Conflict - Already linked or same organization
        '410':
          description: Token expired

  /users/accounts/links/{accountId}:
    delete:
      tags:
        - user-accounts
      summary: Unlink an account
      operationId: unlinkAccount
      security:
        - bearerAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Unlinked successfully
        '400':
          description: Not linked
        '403':
          description: Forbidden

  /users/accounts:
    get:
      tags:
        - user-accounts
      summary: Get all accounts for current user identity
      operationId: getMyAccounts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'

  /working-times:
    post:
      tags:
        - working-times
      summary: Create a working time slot
      operationId: createWorkingTime
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkingTimeCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkingTimeResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Conflict

  /working-times/{id}:
    put:
      tags:
        - working-times
      summary: Update an existing working time slot
      operationId: updateWorkingTime
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkingTimeUpdateRequest'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkingTimeResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '409':
          description: Conflict (e.g. overlapping times)

    delete:
      tags:
        - working-times
      summary: Delete a working time slot
      operationId: deleteWorkingTime
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found

  /admins/organizations:
    post:
      tags:
        - org-management
      summary: Neues Unternehmen mit erstem Unternehmens-Admin anlegen
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Conflict
        '502':
          description: Upstream Error

  /admins/super-admins :
    get:
      tags:
        - super-admin-management
      summary: Liste aller Super-Admins
      operationId: listSuperAdmins
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SuperAdminResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

    post:
      tags:
        - super-admin-management
      summary: Neuen Super-Admin einladen
      operationId: inviteSuperAdmin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteSuperAdminRequest'
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Conflict (Email already in use)
        '502':
          description: Upstream Error

  /admins/super-admins/{userId}:
    delete:
      tags:
        - super-admin-management
      summary: Super-Admin löschen
      operationId: deleteSuperAdmin
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found
        '409':
          description: Conflict (Last Super-Admin)

  /tasks/all:
    get:
      tags:
        - tasks
      summary: Get all tasks for all accounts
      operationId: getTasksForAllAccounts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskAccountListResponse'
  /tasks/account/{accountId}:
    get:
      tags:
        - tasks
      summary: Get all tasks for a specific account
      operationId: getTasksByAccount
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskResponse'
  /tasks:
    post:
      tags:
        - tasks
      summary: Create a new task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Bad Request

  /tasks/{taskId}:
    put:
      tags:
        - tasks
      summary: Update an existing task
      operationId: updateTask
      security:
        - bearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Bad Request
        '404':
          description: Not Found
    delete:
      tags:
        - tasks
      summary: Delete a task
      operationId: deleteTask
      security:
        - bearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserInfoResponse:
      type: object
      required:
        - userId
        - zitadelSub
        - email
        - organizationId
        - zitadelOrganizationId
      properties:
        userId:
          type: string
          format: uuid
          description: Local user ID from the shadow record
        zitadelSub:
          type: string
          description: sub claim from JWT (Zitadel user ID)
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        organizationId:
          type: string
          format: uuid
          description: Local organization ID from the shadow record
        zitadelOrganizationId:
          type: string
          description: Organization ID from Zitadel
        roles:
          type: array
          items:
            type: string
          description: Roles from JWT claim (not mirrored in DB)

    TaskStatus:
      type: string
      enum:
        - OPEN
        - IN_PROGRESS
        - DONE

    CognitiveLoad:
      type: string
      enum:
        - LOW
        - MODERATE
        - HIGH

    TaskAccountListResponse:
      type: object
      required:
        - accountId
        - Tasks
      properties:
        accountId:
          type: string
          format: uuid
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskResponse'


    TaskResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        duration:
          type: integer
          format: int32
        deadline:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/TaskStatus'
        cognitiveLoad:
          $ref: '#/components/schemas/CognitiveLoad'
        dontScheduleBefore:
          type: string
          format: date-time
        customChunkSize:
          type: integer
          format: int32
        dependencyIds:
          type: array
          items:
            type: string
            format: uuid

    TaskCreateRequest:
      type: object
      required:
        - accountId
        - duration
        - title
        - status
        - cognitiveLoad
      properties:
        accountId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
        description:
          type: string
        duration:
          type: integer
          format: int32
          minimum: 1
        deadline:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/TaskStatus'
        cognitiveLoad:
          $ref: '#/components/schemas/CognitiveLoad'
        dontScheduleBefore:
          type: string
          format: date-time
        customChunkSize:
          type: integer
          format: int32
        dependencyIds:
          type: array
          items:
            type: string
            format: uuid

    TaskUpdateRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        duration:
          type: integer
          format: int32
          minimum: 1
        deadline:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/TaskStatus'
        cognitiveLoad:
          $ref: '#/components/schemas/CognitiveLoad'
        dontScheduleBefore:
          type: string
          format: date-time
        customChunkSize:
          type: integer
          format: int32
        dependencyIds:
          type: array
          items:
            type: string
            format: uuid

    LinkTokenResponse:
      type: object
      required:
        - linkToken
        - expiresAt
      properties:
        linkToken:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time

    LinkConfirmRequest:
      type: object
      required:
        - linkToken
      properties:
        linkToken:
          type: string
          format: uuid

    AccountResponse:
      type: object
      required:
        - accountId
        - organizationId
        - organizationName
        - roles
      properties:
        accountId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        organizationName:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        roles:
          type: array
          items:
            type: string

    AccountListResponse:
      type: object
      required:
        - accounts
      properties:

        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'

    WorkingTimeCreateRequest:
      type: object
      required:
        - accountId
        - startTime
        - endTime
      properties:
        accountId:
          type: string
          format: uuid
          description: User account membership ID for which this working time is created
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time

    WorkingTimeUpdateRequest:
      type: object
      required:
        - startTime
        - endTime
      properties:
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time

    WorkingTimeResponse:
      type: object
      required:
        - id
        - accountId
        - organizationId
        - startTime
        - endTime
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    CreateOrganizationRequest:
      type: object
      required:
        - name
        - adminEmail
        - adminFirstName
        - adminLastName
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 255
        adminEmail:
          type: string
          format: email
        adminFirstName:
          type: string
          minLength: 1
          maxLength: 200
        adminLastName:
          type: string
          minLength: 1
          maxLength: 200

    OrganizationResponse:
      type: object
      required:
        - id
        - zitadelOrganizationId
        - name
        - adminEmail
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        zitadelOrganizationId:
          type: string
        name:
          type: string
        adminEmail:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    SuperAdminResponse:
      type: object
      required:
        - zitadelId
        - email
        - createdAt
        - status
      properties:
        zitadelId:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        createdAt:
          type: string
          format: date-time
        status:
          type: string

    InviteSuperAdminRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
          minLength: 1
          maxLength: 50
        lastName:
          type: string
          minLength: 1
          maxLength: 50

security:
  - bearerAuth: []
