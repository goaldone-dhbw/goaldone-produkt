        dontScheduleBefore:
          type: string
          format: date-time
        customChunkSize:
          type: integer
          format: int32
        dependencyIds:
          type: array
          items:
            type: string
            format: uuid

    TaskCreateRequest:
      type: object
      required:
        - accountId
        - duration
        - title
        - status
        - cognitiveLoad
      properties:
        accountId:
          type: string
          format: uuid
        title:
          type: string
