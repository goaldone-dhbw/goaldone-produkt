openapi: 3.0.3
info:
  title: GoalDone API
  description: API for the GoalDone task management application.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: health
    description: Health check operations
  - name: tasks
    description: Task management operations
  - name: test
    description: Test operations
  - name: account-linking
    description: Account linking operations
  - name: user-accounts
    description: User account management

paths:
  /health:
    get:
      tags:
        - health
      summary: Health Check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP

  /test/me:
    get:
      tags:
        - test
      summary: Get current user info
      operationId: getCurrentUserInfo
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          description: Unauthorized

  /accounts/links/request:
    post:
      tags:
        - account-linking
      summary: Request an account link token
      operationId: requestAccountLink
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Link token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkTokenResponse'

  /accounts/links/confirm:
    post:
      tags:
        - account-linking
      summary: Confirm an account link
      operationId: confirmAccountLink
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkConfirmRequest'
      responses:
        '204':
          description: Linked successfully
        '409':
          description: Conflict - Already linked or same organization
        '410':
          description: Token expired

  /accounts/links/{accountId}:
    delete:
      tags:
        - account-linking
      summary: Unlink an account
      operationId: unlinkAccount
      security:
        - bearerAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Unlinked successfully
        '400':
          description: Not linked
        '403':
          description: Forbidden

  /users/accounts:
    get:
      tags:
        - user-accounts
      summary: Get all accounts for current user identity
      operationId: getMyAccounts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserInfoResponse:
      type: object
      required:
        - userId
        - zitadelSub
        - email
        - organizationId
        - zitadelOrganizationId
      properties:
        userId:
          type: string
          format: uuid
          description: Local user ID from the shadow record
        zitadelSub:
          type: string
          description: sub claim from JWT (Zitadel user ID)
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        organizationId:
          type: string
          format: uuid
          description: Local organization ID from the shadow record
        zitadelOrganizationId:
          type: string
          description: Organization ID from Zitadel
        roles:
          type: array
          items:
            type: string
          description: Roles from JWT claim (not mirrored in DB)

    Task:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
    TaskCreate:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string

    LinkTokenResponse:
      type: object
      required:
        - linkToken
        - expiresAt
      properties:
        linkToken:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time

    LinkConfirmRequest:
      type: object
      required:
        - linkToken
      properties:
        linkToken:
          type: string
          format: uuid

    AccountResponse:
      type: object
      required:
        - accountId
        - organizationId
        - organizationName
      properties:
        accountId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        organizationName:
          type: string

    AccountListResponse:
      type: object
      required:
        - accounts
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'

security:
  - bearerAuth: []
