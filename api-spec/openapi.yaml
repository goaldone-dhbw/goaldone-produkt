          format: uuid
        organizationId:
          type: string
          format: uuid
        days:
          type: array
          items:
            $ref: '#/components/schemas/DayOfWeek'
          description: Days of the week this schedule applies to
        startTime:
          type: string
          description: Time of day in HH:mm format
        endTime:
          type: string
          description: Time of day in HH:mm format
        createdAt:
          type: string
          format: date-time
        conflicting:
          type: boolean
          description: True if this schedule overlaps with another working time schedule

    WorkingTimeListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkingTimeResponse'

    LinkConfirmResponse:
      type: object
      required:
        - hasConflicts
      properties:
        hasConflicts:
          type: boolean
          description: True if overlapping working times were detected after linking

    CreateOrganizationRequest:
      type: object
      required:
        - name
        - adminEmail
        - adminFirstName
        - adminLastName
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 255
        adminEmail:
          type: string
          format: email
        adminFirstName:
          type: string
          minLength: 1
          maxLength: 200
        adminLastName:
          type: string
          minLength: 1
          maxLength: 200

    OrganizationResponse:
      type: object
      required:
        - id
        - zitadelOrganizationId
        - name
        - adminEmail
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        zitadelOrganizationId:
          type: string
        name:
          type: string
        adminEmail:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    SuperAdminResponse:
      type: object
      required:
        - zitadelId
        - email
        - createdAt
        - status
      properties:
        zitadelId:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        createdAt:
          type: string
          format: date-time
        status:
          type: string

    InviteSuperAdminRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
          minLength: 1
          maxLength: 50
        lastName:
          type: string
          minLength: 1
          maxLength: 50

    # ----------------------------------------------------------
    # Member Management
    # ----------------------------------------------------------
    MemberRole:
      type: string
      enum:
        - USER
        - COMPANY_ADMIN

    InviteMemberRequest:
      type: object
      required:
        - email
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
          minLength: 1
          maxLength: 200
        lastName:
          type: string
          minLength: 1
          maxLength: 200
        role:
          $ref: '#/components/schemas/MemberRole'
          default: USER

    MemberStatus:
      type: string
      enum:
        - INVITED
        - ACTIVE

    ChangeRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          $ref: '#/components/schemas/MemberRole'

    MemberResponse:
      type: object
      required:
        - zitadelUserId
        - email
        - role
        - status
        - createdAt
      properties:
        accountId:
          type: string
          format: uuid
          nullable: true
          description: |
            Lokale Account-ID aus user_accounts.
            null wenn der Nutzer die Einladung noch nicht angenommen hat.
        zitadelUserId:
          type: string
          description: Zitadel-User-ID
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/MemberRole'
        status:
          $ref: '#/components/schemas/MemberStatus'
        createdAt:
          type: string
          format: date-time

    MemberListResponse:
      type: object
      required:
        - members
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/MemberResponse'

    # ----------------------------------------------------------
    # Schedule – Request
    # ----------------------------------------------------------
    GenerateScheduleRequest:
      type: object
      required: [from]
      properties:
        from:
          type: string
          format: date
          description: |
            Startdatum der Planung (ISO 8601). Der Algorithmus plant ab
            diesem Datum so viele Tage wie nötig, bis alle Tasks eingeplant
            sind oder die Kapazität erschöpft ist. Das Enddatum ergibt sich
            dynamisch aus der Response (`to`-Feld).
          example: "2026-04-07"

    # ----------------------------------------------------------
    # Schedule – Response (Single Account)
    # ----------------------------------------------------------
    ScheduleResponse:
      type: object
      required: [accountId, generatedAt, from, to, totalWorkMinutes, score, warnings, entries, unscheduledTasks]
      properties:
        accountId:
          type: string
          format: uuid
          description: Account für den dieser Plan gilt
        generatedAt:
          type: string
          format: date-time
          description: Zeitstempel der letzten Plan-Generierung
        from:
          type: string
          format: date
          description: Startdatum des geplanten Zeitraums
        to:
          type: string
          format: date
          description: |
            Letzter tatsächlich eingeplanter Tag.
            Wird dynamisch vom Algorithmus bestimmt.
        totalWorkMinutes:
          type: integer
          description: Summe aller eingeplanten Task-Minuten im Zeitraum
          example: 1920
        score:
          $ref: '#/components/schemas/ScheduleScore'
        warnings:
          type: array
          description: Warnungen des Planungsalgorithmus. Leer wenn keine Probleme.
          items:
            $ref: '#/components/schemas/ScheduleWarning'
        entries:
          type: array
          description: Alle Kalendereinträge, sortiert nach Datum und Startzeit
          items:
            $ref: '#/components/schemas/ScheduleEntry'
        unscheduledTasks:
          type: array
          description: |
            Tasks die nicht (vollständig) eingeplant werden konnten.
            Enthält den Grund und Vorschläge zur Behebung.
          items:
            $ref: '#/components/schemas/UnscheduledTask'

    # ----------------------------------------------------------
    # Schedule – Response (All Accounts)
    # ----------------------------------------------------------
    MultiAccountScheduleResponse:
      type: object
      required: [schedules]
      properties:
        schedules:
          type: array
          description: Ein ScheduleResponse pro Account der Identity
          items:
            $ref: '#/components/schemas/ScheduleResponse'

    # ----------------------------------------------------------
    # Schedule Entry
    # ----------------------------------------------------------
    ScheduleEntry:
      type: object
      required: [source, date, startTime, endTime, type, isCompleted, isPinned]
      description: |
        Ein Zeitblock im Kalender. Kann ein persistierter DB-Eintrag
        (`source: ONE_TIME`) oder ein virtuell berechnetes Vorkommen
        einer Recurrence-Rule (`source: RECURRING`) sein.
      properties:
        # --- Diskriminator ---
        source:
          type: string
          enum: [ONE_TIME, RECURRING]
          description: |
            - `ONE_TIME`: persistierter Eintrag. `entryId` ist gesetzt.
            - `RECURRING`: virtuelles Vorkommen. `templateId` + `occurrenceDate` sind gesetzt.

        # --- IDs (je nach source) ---
        entryId:
          type: string
          format: uuid
          nullable: true
          description: |
            Nur bei `source: ONE_TIME`.
            Für PATCH-Aktionen (complete, pin, unpin).
        # --- Zeitdaten ---
        occurenceDate:
          type: string
          format: date
          description: Datum des Eintrags
          example: "2026-04-07"
        startTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: "09:00"
        endTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: "11:00"

        # --- Typ ---
        type:
          type: string
          enum: [TASK, APPOINTMENT]
          description: |
            - `TASK`: Dynamisch eingeplanter Aufgaben-Chunk.
            - `APPOINTMENT`: Fester Termin oder Pause. Siehe `isBreak`.
        isBreak:
          type: boolean
          default: false
          description: |
            Nur relevant bei `type: APPOINTMENT`.
            `true` = Pause, `false` = normaler Termin (Meeting etc.)

        # --- Status ---
        isCompleted:
          type: boolean
          default: false
          description: Ob dieser Block als erledigt markiert wurde.
        isPinned:
          type: boolean
          default: false
          description: |
            Ob dieser Block vom Nutzer fixiert wurde.
            Gepinnte Einträge werden bei Neuplanung nicht verschoben.

        # --- Task-spezifische Felder ---
        originalItemId:
          type: string
          format: uuid
          nullable: true
          description: "Ursprüngliche Task-ID oder Appointment-ID dieses Eintrags"
        originalItemTitle:
          type: string
          nullable: true
          description: "Ursprünglicher Titel des Tasks oder Appointments"
        chunkIndex:
          type: integer
          nullable: true
          description: |
            Gesetzt wenn `type: TASK`.
            Nullbasierter Index dieses Chunks innerhalb des Tasks.
          example: 1
        totalChunks:
          type: integer
          nullable: true
          description: |
            Gesetzt wenn `type: TASK`.
            Gesamtanzahl der Chunks in die der Task aufgeteilt wurde.
          example: 4

    # ----------------------------------------------------------
    # Unscheduled Task
    # ----------------------------------------------------------
    UnscheduledTask:
      type: object
      required: [taskId, taskTitle, durationMinutes, reason, shortfallMinutes]
      properties:
        taskId:
          type: string
          format: uuid
        taskTitle:
          type: string
        durationMinutes:
          type: integer
          description: Gesamtdauer des Tasks in Minuten
          example: 480
        deadline:
          type: string
          format: date-time
          nullable: true
          description: Deadline des Tasks (null = keine Deadline)
        reason:
          type: string
          enum: [DEADLINE_IMPOSSIBLE, CAPACITY_EXCEEDED, DEPENDENCY_BLOCKED]
          description: |
            - `DEADLINE_IMPOSSIBLE`: Zu wenig Arbeitszeit bis zur Deadline.
            - `CAPACITY_EXCEEDED`: Gesamtkapazität im Planungshorizont reicht nicht.
            - `DEPENDENCY_BLOCKED`: Abhängiger Task ist selbst nicht planbar.
        shortfallMinutes:
          type: integer
          description: |
            Fehlende Minuten. Bei `DEADLINE_IMPOSSIBLE`: wie viel Zeit
            bis zur Deadline fehlt. Bei `CAPACITY_EXCEEDED`: Gesamtüberlauf.
          example: 120

    # ----------------------------------------------------------
    # Schedule Warning
    # ----------------------------------------------------------
    ScheduleWarning:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [DEADLINE_TIGHT, OVERLOADED_DAY, PIN_CONFLICT]
          description: |
            - `DEADLINE_TIGHT`: Task eingeplant, aber < 30 min Puffer bis Deadline.
            - `OVERLOADED_DAY`: Ein Tag übersteigt die verfügbare Arbeitszeit.
            - `PIN_CONFLICT`: Gepinnter Eintrag überlappt mit einem anderen.
        message:
          type: string
          description: Menschenlesbare Beschreibung
          example: "Task 'Report' hat nur 25 min Puffer bis zur Deadline"
        taskId:
          type: string
          format: uuid
          nullable: true
          description: Betroffener Task (wenn zutreffend)
        date:
          type: string
          format: date
          nullable: true
          description: Betroffenes Datum (wenn zutreffend)

    # ----------------------------------------------------------
    # Schedule Score (Debug)
    # ----------------------------------------------------------
    ScheduleScore:
      type: object
      description: |
        Score des Planungsalgorithmus zur Einschätzung der Planungsqualität.
        TODO: In Zukunft entfernen oder hinter ein Feature-Flag setzen.
        Nur für Entwicklung und Debugging vorgesehen.
      required: [hard, medium, soft, feasible]
      properties:
        hard:
          type: integer
          format: int64
          description: |
            Hard-Score. Muss 0 sein für einen gültigen Plan.
            < 0 bedeutet: harte Constraints verletzt.
          example: 0
        medium:
          type: integer
          format: int64
          description: |
            Medium-Score. < 0 bedeutet: Deadlines nicht alle einhaltbar
            oder Tasks nicht vollständig eingeplant.
          example: -120
        soft:
          type: integer
          format: int64
          description: |
            Soft-Score. Optimierungsqualität. Je näher an 0, desto besser.
          example: -45
        feasible:
          type: boolean
          description: "`true` wenn hard == 0 (Plan ist gültig)."
          example: true

    # ----------------------------------------------------------
    # Schedule Validation Error (422)
    # ----------------------------------------------------------
    ScheduleValidationError:
      type: object
      required: [errors]
      properties:
        errors:
          type: array
          items:
            type: object
            required: [type, message]
            properties:
              type:
                type: string
                enum: [CIRCULAR_DEPENDENCY, CHUNK_EXCEEDS_DURATION, NOT_BEFORE_AFTER_DEADLINE, WORKING_HOURS_OVERLAP]
                description: |
                  - `CIRCULAR_DEPENDENCY`: Zirkuläre Abhängigkeit zwischen Tasks.
                  - `CHUNK_EXCEEDS_DURATION`: customChunkSize ist größer als Aufgabendauer.
                  - `NOT_BEFORE_AFTER_DEADLINE`: notBefore-Datum liegt nach der Deadline.
                  - `WORKING_HOURS_OVERLAP`: Arbeitszeiten zwischen Accounts überlappen sich.
              message:
                type: string
                example: "Zirkuläre Abhängigkeit: Task A → Task B → Task A"
              taskIds:
                type: array
                items:
                  type: string
                  format: uuid
                description: Betroffene Task-IDs

security:
  - bearerAuth: []
