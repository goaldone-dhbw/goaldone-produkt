        dontScheduleBefore:
          type: string
          format: date-time
        customChunkSize:
          type: integer
          format: int32
        dependencyIds:
          type: array
          items:
            type: string
            format: uuid

    TaskUpdateRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        duration:
          type: integer
          format: int32
          minimum: 1
        deadline:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/TaskStatus'
        cognitiveLoad:
          $ref: '#/components/schemas/CognitiveLoad'
        dontScheduleBefore:
