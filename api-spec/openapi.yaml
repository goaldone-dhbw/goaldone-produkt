openapi: 3.0.3
info:
  title: GoalDone API
  description: API for the GoalDone task management application.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: health
    description: Health check operations
  - name: tasks
    description: Task management operations
  - name: working-times
    description: Working time management
  - name: appointments
    description: Appointment management operations
  - name: schedules
    description: Schedule management operations
  - name: user-accounts
    description: User Account operations
  - name: member-management
    description: Organization member management operations
  - name: org-management
    description: Organization management operations
  - name: super-admin-management
    description: Super Admin management operations

paths:
  /health:
    get:
      tags:
        - health
      summary: Health Check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP

  /users/accounts/links/request:
    post:
      tags:
        - user-accounts
      summary: Request an account link token
      operationId: requestAccountLink
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
      responses:
        '201':
          description: Link token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkTokenResponse'

  /users/accounts/links/confirm:
    post:
      tags:
        - user-accounts
      summary: Confirm an account link
      operationId: confirmAccountLink
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkConfirmRequest'
      responses:
        '200':
          description: Linked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkConfirmResponse'
        '409':
          description: Conflict - Already linked or same organization
        '410':
          description: Token expired

  /users/accounts/links/{accountId}:
    delete:
      tags:
        - user-accounts
      summary: Unlink an account
      operationId: unlinkAccount
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Unlinked successfully
        '400':
          description: Not linked
        '403':
          description: Forbidden

  /users/accounts:
    get:
      tags:
        - user-accounts
      summary: Get all accounts for current user identity
      operationId: getMyAccounts
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'
  # ============================================================
  # APPOINTMENTS
  # ============================================================
  /appointments/{accountId}:
    get:
      tags: [ appointments ]
      summary: List appointments for an account
      operationId: listAppointments
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - $ref: '#/components/parameters/AccountIdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentListResponse'
        '401':
          description: Unauthorized
        '403':
          description: Account not owned by user
        '404':
          description: Account not found

    post:
      tags: [ appointments ]
      summary: Create a new appointment or break
      operationId: createAppointment
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - $ref: '#/components/parameters/AccountIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '401':
          description: Unauthorized
        '403':
          description: Account not owned by user
        '404':
          description: Account not found

  /appointments/{accountId}/{appointmentId}:
    get:
      tags: [ appointments ]
      summary: Get an appointment by ID
      operationId: getAppointment
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - $ref: '#/components/parameters/AccountIdPath'
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '401':
          description: Unauthorized
        '403':
          description: Account not owned by user
        '404':
          description: Appointment not found

    delete:
      tags: [ appointments ]
      summary: Delete an appointment
      operationId: deleteAppointment
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - $ref: '#/components/parameters/AccountIdPath'
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '403':
          description: Account not owned by user
        '404':
          description: Appointment not found

  # ============================================================
  # SCHEDULES – Single Account
  # ============================================================
  /schedules/{accountId}:
    get:
      tags: [ schedules ]
      summary: Aktuellen Plan eines Accounts abrufen
      description: |
        Gibt den Plan für den angegebenen Account und Zeitraum zurück.
        Die Antwort enthält zwei Arten von Einträgen, erkennbar am `source`-Feld:

        - `source: ONE_TIME` – persistierte Einträge aus der Datenbank.
          `entryId` ist gesetzt und wird für Aktionen (complete, pin, unpin) benötigt.

        - `source: RECURRING` – virtuelle Vorkommen, on-the-fly aus
          Recurrence-Rules berechnet. `templateId` und `occurrenceDate` sind gesetzt.

        Alle Einträge werden nach Datum und Startzeit sortiert zurückgegeben.
      operationId: getSingleAccountSchedule
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
      responses:
        '200':
          description: Plan für den Account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResponse'
        '401':
          description: Unauthorized
        '403':
          description: Account gehört nicht zur Identity des Nutzers
        '404':
          description: Account nicht gefunden

    post:
      tags: [ schedules ]
      summary: Plan für einen Account generieren
      description: |
        Löst den Planungsalgorithmus für den angegebenen Account aus.
        Bereits gepinnte Einträge (`isPinned: true`) bleiben an ihrem Platz,
        alle anderen Chunks werden neu verteilt.
      operationId: generateSingleAccountSchedule
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - $ref: '#/components/parameters/AccountIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateScheduleRequest'
      responses:
        '200':
          description: Generierter Plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResponse'
        '401':
          description: Unauthorized
        '403':
          description: Account gehört nicht zur Identity des Nutzers
        '422':
          description: |
            Validierungsfehler – Plan kann nicht erstellt werden.
            Mögliche Ursachen: zirkuläre Abhängigkeiten, customChunkSize > Aufgabendauer,
            notBefore liegt nach Deadline.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleValidationError'

  # ============================================================
  # SCHEDULES – All Accounts
  # ============================================================
  /schedules/all:
    get:
      tags: [ schedules ]
      summary: Pläne aller Accounts der Identity abrufen
      description: |
        Gibt pro Account der aktuellen Identity einen separaten Plan zurück.
        Die Arbeitszeiten zwischen Accounts überlappen sich nicht.
      operationId: getAllAccountsSchedule
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrgIdHeaderOptional'
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
      responses:
        '200':
          description: Pläne aller Accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiAccountScheduleResponse'
        '401':
          description: Unauthorized

    post:
      tags: [ schedules ]
      summary: Pläne für alle Accounts generieren
      description: |
        Löst den Planungsalgorithmus für alle Accounts der Identity aus.
        Accounts werden sequentiell oder parallel verarbeitet
        (Arbeitszeiten sind disjunkt). Gepinnte Einträge bleiben fixiert.
      operationId: generateAllAccountsSchedule
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateScheduleRequest'
      responses:
        '200':
          description: Generierte Pläne pro Account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiAccountScheduleResponse'
        '401':
          description: Unauthorized
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleValidationError'

  /working-times:
    get:
      tags:
        - working-times
      summary: Get all working time slots for current user
      operationId: getWorkingTimes
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeaderOptional'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkingTimeListResponse'
        '401':
          description: Unauthorized

    post:
      tags:
        - working-times
      summary: Create a working time slot
      operationId: createWorkingTime
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkingTimeCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkingTimeResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Conflict

  /working-times/{id}:
    put:
      tags:
        - working-times
      summary: Update an existing working time slot
      operationId: updateWorkingTime
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkingTimeUpdateRequest'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkingTimeResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '409':
          description: Conflict (e.g. overlapping times)

    delete:
      tags:
        - working-times
      summary: Delete a working time slot
      operationId: deleteWorkingTime
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found

  /admins/organizations:
    post:
      tags:
        - org-management
      summary: Neues Unternehmen mit erstem Unternehmens-Admin anlegen
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Conflict
        '502':
          description: Upstream Error

  /admins/super-admins :
    get:
      tags:
        - super-admin-management
      summary: Liste aller Super-Admins
      operationId: listSuperAdmins
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SuperAdminResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

    post:
      tags:
        - super-admin-management
      summary: Neuen Super-Admin einladen
      operationId: inviteSuperAdmin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteSuperAdminRequest'
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Conflict (Email already in use)
        '502':
          description: Upstream Error

  /admins/super-admins/{userId}:
    delete:
      tags:
        - super-admin-management
      summary: Super-Admin löschen
      operationId: deleteSuperAdmin
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found
        '409':
          description: Conflict (Last Super-Admin)

  # ============================================================
  # MEMBER MANAGEMENT – Invite
  # ============================================================
  /organization/members/invite:
    post:
      tags:
        - member-management
      summary: Neuen Nutzer in die Organisation einladen
      description: |
        Legt einen neuen Nutzer in der Org an, vergibt die gewünschte
        Projektrolle und löst den Versand einer gebrandeten Einladungs-E-Mail aus.
        Ein lokaler Shadow-Record wird nicht angelegt – das geschieht über
        JIT-Provisioning beim ersten Login des eingeladenen Nutzers.
        Organization ID wird über X-Org-ID Header übergeben.
      operationId: inviteMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
      responses:
        '201':
          description: Einladung versendet
        '400':
          description: Bad Request (Validation)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – nicht COMPANY_ADMIN oder nicht Mitglied dieser Org
        '409':
          description: Conflict (EMAIL_ALREADY_IN_USE)
        '502':
          description: Upstream Error

  /organization/members/{userId}/reinvite:
    post:
      tags:
        - member-management
      summary: Einladung erneut versenden
      description: |
        Generiert einen neuen Einladungscode für einen noch nicht aktiven
        Nutzer und versendet erneut eine gebrandete Einladungs-E-Mail.
        Der vorherige Einladungslink wird dabei invalidiert.
        Nur für Nutzer mit Status INVITED aufrufbar.
        Organization ID wird über X-Org-ID Header übergeben.
      operationId: reinviteMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - name: userId
          in: path
          required: true
          description: Auth Service User ID
          schema:
            type: string
      responses:
        '204':
          description: Einladung erneut versendet
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Conflict (USER_ALREADY_ACTIVE)
        '404':
          description: User not found
        '502':
          description: Upstream Error

  # ============================================================
  # MEMBER MANAGEMENT – List, Role, Remove
  # ============================================================
  /organization/members:
    get:
      tags:
        - member-management
      summary: Alle Mitglieder einer Organisation auflisten
      description: |
        Listet alle Mitglieder der Organisation auf, inklusive eingeladener
        aber noch nicht aktiver Nutzer. Status INVITED bedeutet, die Einladung
        wurde noch nicht angenommen (kein JIT-Record vorhanden).
        Organization ID wird über X-Org-ID Header übergeben.
      operationId: listMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberListResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – nicht COMPANY_ADMIN oder nicht Mitglied dieser Org

  /organization/members/{userId}/role:
    put:
      tags:
        - member-management
      summary: Rolle eines Mitglieds ändern
      description: |
        Ändert die Projektrolle eines Mitglieds auf dem Goaldone-Projekt.
        Die Änderung wird nicht lokal in der DB gespeichert – die neue Rolle
        ist ab dem nächsten Token-Refresh des betroffenen Nutzers wirksam.
        Degradierung des letzten COMPANY_ADMIN wird verhindert.
        Organization ID wird über X-Org-ID Header übergeben.
      operationId: changeMemberRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - name: userId
          in: path
          required: true
          description: Auth Service User ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeRoleRequest'
      responses:
        '200':
          description: Rolle geändert
        '400':
          description: Bad Request (ROLE_UNCHANGED)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Conflict (LAST_ADMIN_CANNOT_BE_DEMOTED)
        '502':
          description: Upstream Error

  /organization/members/{userId}:
    delete:
      tags:
        - member-management
      summary: Mitglied aus der Organisation entfernen
      description: |
        Entfernt den Nutzer aus der Org und löscht den lokalen Account
        inklusive aller verknüpften Daten (Tasks, Appointments, Working-Times).
        Bei eingeladenen, noch nicht aktiven Nutzern wird nur der User
        gelöscht. Selbst-Entfernung ist nicht erlaubt.
        Organization ID wird über X-Org-ID Header übergeben.
      operationId: removeMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - name: userId
          in: path
          required: true
          description: Auth Service User ID
          schema:
            type: string
      responses:
        '204':
          description: User removed
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (CANNOT_REMOVE_SELF / not member of Org)
        '409':
          description: Conflict (LAST_ADMIN_CANNOT_BE_REMOVED)
        '502':
          description: Upstream Error

  /tasks/all:
    get:
      tags:
        - tasks
      summary: Get all tasks for all accounts
      operationId: getTasksForAllAccounts
      parameters:
        - $ref: '#/components/parameters/OrgIdHeaderOptional'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskAccountListResponse'
  /tasks/account/{accountId}:
    get:
      tags:
        - tasks
      summary: Get all tasks for a specific account
      operationId: getTasksByAccount
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskResponse'
  /tasks:
    post:
      tags:
        - tasks
      summary: Create a new task
      operationId: createTask
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Bad Request

  /tasks/{taskId}:
    put:
      tags:
        - tasks
      summary: Update an existing task
      operationId: updateTask
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Bad Request
        '404':
          description: Not Found
    delete:
      tags:
        - tasks
      summary: Delete a task
      operationId: deleteTask
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgIdHeader'
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ============================================================
  # REUSABLE PARAMETERS
  # ============================================================
  parameters:
    OrgIdHeader:
      name: X-Org-ID
      in: header
      required: true
      description: Organization ID context for the request
      schema:
        type: string
        format: uuid

    OrgIdHeaderOptional:
      name: X-Org-ID
      in: header
      required: false
      description: Organization ID context for the request (optional for listing endpoints)
      schema:
        type: string
        format: uuid

    AccountIdPath:
      name: accountId
      in: path
      required: true
      description: Account-ID (ein Account der aktuellen Identity)
      schema:
        type: string
        format: uuid

    FromQuery:
      name: from
      in: query
      required: true
      description: Startdatum des Zeitraums (ISO 8601)
      schema:
        type: string
        format: date
        example: "2026-04-07"

    ToQuery:
      name: to
      in: query
      required: true
      description: Enddatum des Zeitraums (ISO 8601)
      schema:
        type: string
        format: date
        example: "2026-04-11"

    OrgIdPath:
      name: orgId
      in: path
      required: true
      description: Interne UUID der Organisation
      schema:
        type: string
        format: uuid

    ZitadelUserIdPath:
      name: zitadelUserId
      in: path
      required: true
      description: Zitadel User ID
      schema:
        type: string

  # ============================================================
  # SCHEMAS
  # ============================================================
  schemas:
    UserInfoResponse:
      type: object
      required:
        - userId
        - zitadelSub
        - email
        - organizationId
        - zitadelOrganizationId
      properties:
        userId:
          type: string
          format: uuid
          description: Local user ID from the shadow record
        zitadelSub:
          type: string
          description: sub claim from JWT (Zitadel user ID)
        email:
          type: string
