          type: string
          format: uuid

    AccountResponse:
      type: object
      required:
        - accountId
        - organizationId
        - organizationName
        - roles
        - hasConflicts
      properties:
        accountId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        organizationName:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        roles:
          type: array
          items:
            type: string
        hasConflicts:
          type: boolean
          description: True if there are overlapping working time slots for this user identity

    AccountListResponse:
      type: object
      required:
        - accounts
      properties:

        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'

    DayOfWeek:
      type: string
      enum:
        - MONDAY
        - TUESDAY
        - WEDNESDAY
        - THURSDAY
        - FRIDAY
        - SATURDAY
        - SUNDAY

    WorkingTimeCreateRequest:
      type: object
      required:
        - accountId
        - days
        - startTime
        - endTime
      properties:
        accountId:
          type: string
          format: uuid
          description: User account membership ID for which this working time is created
        days:
          type: array
          items:
            $ref: '#/components/schemas/DayOfWeek'
          minItems: 1
          description: Days of the week this schedule applies to
        startTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: Time of day in HH:mm format
        endTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: Time of day in HH:mm format

    WorkingTimeUpdateRequest:
      type: object
      required:
        - days
        - startTime
        - endTime
      properties:
        days:
          type: array
          items:
            $ref: '#/components/schemas/DayOfWeek'
          minItems: 1
          description: Days of the week this schedule applies to
        startTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: Time of day in HH:mm format
        endTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: Time of day in HH:mm format

    WorkingTimeResponse:
      type: object
      required:
        - id
        - accountId
        - organizationId
