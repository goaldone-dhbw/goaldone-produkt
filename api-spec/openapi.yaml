        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        title:
          type: string
        isBreak:
          type: boolean
          description: true = break/pause, false = appointment/meeting
        appointmentType:
          $ref: '#/components/schemas/AppointmentType'
        date:
          type: string
          format: date
          nullable: true
          description: Required for ONE_TIME, null for RECURRING
        startTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: Start time in HH:mm format
        endTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: End time in HH:mm format
        rrule:
          type: string
          nullable: true
          description: iCal RRule expression for recurrence (required for RECURRING)
        createdAt:
          type: string
          format: date-time

    AppointmentCreate:
      type: object
      required: [title, isBreak, appointmentType, startTime, endTime]
      properties:
        title:
          type: string
        isBreak:
          type: boolean
        appointmentType:
          $ref: '#/components/schemas/AppointmentType'
        date:
          type: string
          format: date
          nullable: true
        startTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        endTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        rrule:
          type: string
          nullable: true

    AppointmentListResponse:
      type: object
      required: [appointments]
      properties:
        appointments:
          type: array
          items:
            $ref: '#/components/schemas/Appointment'

    # ----------------------------------------------------------
    # Account Linking
    # ----------------------------------------------------------
    LinkTokenResponse:
      type: object
