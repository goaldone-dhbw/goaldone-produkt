openapi: 3.0.3
info:
  title: GoalDone API
  description: API for the GoalDone task management application.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: health
    description: Health check operations
  - name: tasks
    description: Task management operations
  - name: test
    description: Test operations

paths:
  /health:
    get:
      tags:
        - health
      summary: Health Check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP

  /tasks:
    get:
      tags:
        - tasks
      summary: List Tasks
      operationId: listTasks
      responses:
        '200':
          description: A list of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      tags:
        - tasks
      summary: Create Task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /api/test/me:
    get:
      tags:
        - test
      summary: Get current user info
      operationId: getCurrentUserInfo
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserInfoResponse:
      type: object
      required:
        - userId
        - zitadelSub
        - email
        - organizationId
        - zitadelOrganizationId
      properties:
        userId:
          type: string
          format: uuid
          description: Local user ID from the shadow record
        zitadelSub:
          type: string
          description: sub claim from JWT (Zitadel user ID)
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        organizationId:
          type: string
          format: uuid
          description: Local organization ID from the shadow record
        zitadelOrganizationId:
          type: string
          description: Organization ID from Zitadel
        roles:
          type: array
          items:
            type: string
          description: Roles from JWT claim (not mirrored in DB)

    Task:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
    TaskCreate:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string

security:
  - bearerAuth: []
