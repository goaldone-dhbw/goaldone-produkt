info:
  name: Request an account link token
  type: http
  seq: 1
  tags:
    - account-linking

http:
  method: POST
  url: "{{baseUrl}}/accounts/links/request"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Link token created
    request:
      url: "{{baseUrl}}/accounts/links/request"
      method: POST
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "linkToken": "",
            "expiresAt": ""
          }
