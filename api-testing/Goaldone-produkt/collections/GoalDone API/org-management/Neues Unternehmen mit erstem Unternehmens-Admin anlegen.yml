info:
  name: Neues Unternehmen mit erstem Unternehmens-Admin anlegen
  type: http
  seq: 1
  tags:
    - org-management

http:
  method: POST
  url: "{{baseUrl}}/admins/organizations"
  body:
    type: json
    data: |-
      {
        "name": "",
        "adminEmail": "",
        "adminFirstName": "",
        "adminLastName": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
