    description: Created
    request:
      url: "{{baseUrl}}/admins/organizations"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "adminEmail": "",
            "adminFirstName": "",
            "adminLastName": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "zitadelOrganizationId": "",
            "name": "",
            "adminEmail": "",
            "createdAt": ""
          }
