info:
  name: Delete a working time slot
  type: http
  seq: 4
  tags:
    - working-times

http:
  method: DELETE
  url: "{{baseUrl}}/working-times/:id"
  params:
    - name: id
      value: ""
      type: path
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
