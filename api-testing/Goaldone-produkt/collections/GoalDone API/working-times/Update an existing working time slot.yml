info:
  name: Update an existing working time slot
  type: http
  seq: 3
  tags:
    - working-times

http:
  method: PUT
  url: "{{baseUrl}}/working-times/:id"
  params:
    - name: id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "days": [
          "MONDAY"
        ],
        "startTime": "",
        "endTime": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
