      body:
        type: json
        data: |-
          {
            "days": [
              "MONDAY"
            ],
            "startTime": "",
            "endTime": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
