info:
  name: Get all working time slots for current user
  type: http
  seq: 1
  tags:
    - working-times

http:
  method: GET
  url: "{{baseUrl}}/working-times"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/working-times"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "items": [
              {
                "id": "",
                "accountId": "",
                "organizationId": "",
                "days": [
                  "MONDAY"
                ],
                "startTime": "",
                "endTime": "",
                "createdAt": "",
                "conflicting": false
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/working-times"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
