info:
  name: Delete a task
  type: http
  seq: 4
  tags:
    - tasks

http:
  method: DELETE
  url: "{{baseUrl}}/tasks/{{taskId}}"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response
    description: No Content
    request:
      url: "{{baseUrl}}/tasks/{{taskId}}"
      method: DELETE
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
  - name: 404 Not Found
    description: Unknown task id
    request:
      url: "{{baseUrl}}/tasks/00000000-0000-0000-0000-00000000ffff"
      method: DELETE
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: 401 Unauthorized
    description: Missing or invalid bearer token
    request:
      url: "{{baseUrl}}/tasks/{{taskId}}"
      method: DELETE
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""

