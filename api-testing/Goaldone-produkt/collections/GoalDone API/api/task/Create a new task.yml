info:
  name: Create a new task
  type: http
  seq: 1
  tags:
    - tasks

http:
  method: POST
  url: "{{baseUrl}}/tasks"
  body:
    type: json
    data: |-
      {
        "title": "Dokumentation",
        "description": "API-Dokumentation finalisieren",
        "duration": 120,
        "status": "OPEN"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Created
    request:
      url: "{{baseUrl}}/tasks"
      method: POST
      body:
        type: json
        data: |-
          {
            "title": "Dokumentation",
            "description": "API-Dokumentation finalisieren",
            "duration": 120,
            "status": "OPEN"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "00000000-0000-0000-0000-000000000001",
            "title": "Dokumentation",
            "description": "API-Dokumentation finalisieren",
            "duration": 120,
            "deadline": null,
            "status": "OPEN",
            "dependencyIds": []
          }
  - name: 400 Invalid Duration
    description: Bad Request for duration <= 0
    request:
      url: "{{baseUrl}}/tasks"
      method: POST
      body:
        type: json
        data: |-
          {
            "title": "Fehler-Task",
            "duration": -10,
            "status": "OPEN"
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
