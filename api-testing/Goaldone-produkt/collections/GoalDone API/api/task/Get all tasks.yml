info:
  name: Get all tasks
  type: http
  seq: 2
  tags:
    - tasks

http:
  method: GET
  url: "{{baseUrl}}/tasks"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/tasks"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "00000000-0000-0000-0000-000000000001",
              "title": "Dokumentation",
              "description": "API-Dokumentation finalisieren",
              "duration": 120,
              "deadline": null,
              "status": "OPEN",
              "dependencyIds": []
            }
          ]
  - name: 401 Unauthorized
    description: Missing or invalid bearer token
    request:
      url: "{{baseUrl}}/tasks"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""

