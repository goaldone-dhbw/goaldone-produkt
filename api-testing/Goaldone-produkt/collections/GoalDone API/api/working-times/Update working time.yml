info:
  name: Update working time
  type: http
  seq: 2
  tags:
    - working-times

http:
  method: PUT
  url: "{{baseUrl}}/working-times/{{workingTimeId}}"
  body:
    type: json
    data: |-
      {
        "startTime": "2026-04-20T08:00:00Z",
        "endTime": "2026-04-20T16:00:00Z"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    description: Working time updated successfully
    request:
      url: "{{baseUrl}}/working-times/{{workingTimeId}}"
      method: PUT
      body:
        type: json
        data: |-
          {
            "startTime": "2026-04-20T08:00:00Z",
            "endTime": "2026-04-20T16:00:00Z"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "{{workingTimeId}}",
            "accountId": "{{accountId}}",
            "organizationId": "00000000-0000-0000-0000-000000000201",
            "startTime": "2026-04-20T08:00:00Z",
            "endTime": "2026-04-20T16:00:00Z",
            "createdAt": "2026-04-20T08:59:00Z"
          }
  - name: 404 Not Found
    description: Working time slot does not exist
    request:
      url: "{{baseUrl}}/working-times/00000000-0000-0000-0000-000000000000"
      method: PUT
      body:
        type: json
        data: |-
          {
            "startTime": "2026-04-20T08:00:00Z",
            "endTime": "2026-04-20T16:00:00Z"
          }
    response:
      status: 404
      statusText: Not Found
  - name: 409 Overlap
    description: Updated time slot overlaps with another existing slot
    request:
      url: "{{baseUrl}}/working-times/{{workingTimeId}}"
      method: PUT
      body:
        type: json
        data: |-
          {
            "startTime": "2026-04-20T11:00:00Z",
            "endTime": "2026-04-20T15:00:00Z"
          }
    response:
      status: 409
      statusText: Conflict
