info:
  name: Neuen Super-Admin einladen
  type: http
  seq: 2
  tags:
    - super-admin-management

http:
  method: POST
  url: "{{baseUrl}}/admins/super-admins"
  body:
    type: json
    data: |-
      {
        "email": "",
        "firstName": "",
        "lastName": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
