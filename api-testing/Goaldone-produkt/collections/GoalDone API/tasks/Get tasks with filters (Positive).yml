info:
  name: Get tasks with filters (Positive)
  type: http
  seq: 6
  tags:
    - tasks

http:
  method: GET
  url: "{{baseUrl}}/tasks?cognitiveLoad=LOW"
  params:
    - name: cognitiveLoad
      value: LOW
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/tasks?cognitiveLoad=HIGH"
      method: GET
      params:
        - name: cognitiveLoad
          value: HIGH
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "123e4567-e89b-12d3-a456-426614174000",
              "title": "Example High Cognitive Load Task",
              "duration": 60,
              "status": "OPEN",
              "cognitiveLoad": "HIGH"
            }
          ]
