info:
  name: Get all tasks for all accounts
  type: http
  seq: 1
  tags:
    - tasks

http:
  method: GET
  url: "{{baseUrl}}/tasks/all"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/tasks/all"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "accountId": "",
              "tasks": [
                {
                  "id": "",
                  "title": "",
                  "description": "",
                  "duration": 0,
                  "deadline": "",
                  "status": "OPEN",
                  "cognitiveLoad": "LOW",
                  "dontScheduleBefore": "",
                  "customChunkSize": 0,
                  "dependencyIds": []
                }
              ]
            }
          ]
