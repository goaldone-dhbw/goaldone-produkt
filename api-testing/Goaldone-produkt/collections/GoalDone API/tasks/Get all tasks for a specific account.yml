info:
  name: Get all tasks for a specific account
  type: http
  seq: 2
  tags:
    - tasks

http:
  method: GET
  url: "{{baseUrl}}/tasks/account/:accountId"
  params:
    - name: accountId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/tasks/account/:accountId"
      method: GET
      params:
        - name: accountId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "title": "",
              "description": "",
              "duration": 0,
              "deadline": "",
              "status": "OPEN",
              "cognitiveLoad": "LOW",
              "dontScheduleBefore": "",
              "customChunkSize": 0,
              "dependencyIds": []
            }
          ]
