info:
  name: List all super-admins
  type: http
  seq: 1
  tags:
    - super-admin

http:
  method: GET
  url: "{{baseUrl}}/admins/super-admins"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/admins/super-admins"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "superAdmins": [
              {
                "userId": "",
                "email": "",
                "firstName": "",
                "lastName": "",
                "createdAt": "",
                "status": ""
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/admins/super-admins"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: Forbidden - requires SUPER_ADMIN role
    request:
      url: "{{baseUrl}}/admins/super-admins"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
