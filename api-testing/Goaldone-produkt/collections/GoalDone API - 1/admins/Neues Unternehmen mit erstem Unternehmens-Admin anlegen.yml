info:
  name: Neues Unternehmen mit erstem Unternehmens-Admin anlegen
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/admins/organizations"
  body:
    type: json
    data: |-
      {
        "name": "string",
        "adminEmail": "user@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
