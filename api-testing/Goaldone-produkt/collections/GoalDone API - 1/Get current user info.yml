info:
  name: Get current user info
  type: http
  seq: 1
  tags:
    - test

http:
  method: GET
  url: "{{baseUrl}}/test/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/test/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "userId": "",
            "zitadelSub": "",
            "email": "",
            "firstName": "",
            "lastName": "",
            "organizationId": "",
            "zitadelOrganizationId": "",
            "roles": []
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/test/me"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
