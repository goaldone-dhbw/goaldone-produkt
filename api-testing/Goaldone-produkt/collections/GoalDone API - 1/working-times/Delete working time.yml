info:
  name: Delete working time
  type: http
  seq: 3
  tags:
    - working-times

http:
  method: DELETE
  url: "{{baseUrl}}/working-times/{{workingTimeId}}"
  body:
    type: none
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 No Content
    description: Working time deleted successfully
    request:
      url: "{{baseUrl}}/working-times/{{workingTimeId}}"
      method: DELETE
    response:
      status: 204
      statusText: No Content
  - name: 404 Not Found
    description: Working time slot does not exist or belongs to another user
    request:
      url: "{{baseUrl}}/working-times/00000000-0000-0000-0000-000000000000"
      method: DELETE
    response:
      status: 404
      statusText: Not Found
  - name: 401 Unauthorized
    description: Missing or invalid bearer token
    request:
      url: "{{baseUrl}}/working-times/{{workingTimeId}}"
      method: DELETE
    response:
      status: 401
      statusText: Unauthorized