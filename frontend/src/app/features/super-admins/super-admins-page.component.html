<div class="mx-auto flex w-full max-w-5xl flex-col gap-6 p-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold">Super-Admins</h1>
      <p class="mt-1 text-sm text-gray-600">Übersicht aller aktuell vorhandenen Super-Admins.</p>
    </div>

    <p-button
      label="Super-Admin hinzufügen"
      icon="pi pi-plus"
      [disabled]="loading()"
      (onClick)="openAddDialog()"
    ></p-button>
  </div>

  <p-message *ngIf="errorMessage()" severity="error" [text]="errorMessage()!"></p-message>

  <div *ngIf="loading()" class="flex justify-center py-10">
    <p-progressSpinner strokeWidth="4" ariaLabel="Lädt"></p-progressSpinner>
  </div>

  <div
    *ngIf="!loading() && superAdmins().length === 0"
    class="rounded-xl border border-gray-200 bg-white p-6 text-sm text-gray-600 shadow-sm"
  >
    Es sind aktuell keine Super-Admins vorhanden.
  </div>

  <div
    *ngIf="!loading() && superAdmins().length > 0"
    class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm"
  >
    <div class="grid grid-cols-12 gap-4 border-b border-gray-200 bg-gray-50 px-6 py-4 text-sm font-medium text-gray-700">
      <div class="col-span-6">E-Mail</div>
      <div class="col-span-3">Status</div>
      <div class="col-span-3 text-right">Aktionen</div>
    </div>

    <div
      *ngFor="let admin of superAdmins(); trackBy: trackByUserId"
      class="grid grid-cols-12 items-center gap-4 border-b border-gray-100 px-6 py-4 last:border-b-0"
    >
      <div class="col-span-6 text-gray-900">{{ admin.email }}</div>
      <div class="col-span-3 text-sm text-gray-600">{{ admin.status }}</div>
      <div class="col-span-3 flex justify-end">
        <p-button
          label="Löschen"
          severity="danger"
          variant="text"
          [disabled]="hasOnlyOneSuperAdmin()"
          (onClick)="openDeleteDialog(admin)"
        ></p-button>
      </div>
    </div>
  </div>

  <p-message
    *ngIf="hasOnlyOneSuperAdmin()"
    severity="warn"
    text="Der letzte Super-Admin kann nicht gelöscht werden."
  ></p-message>
</div>

<app-add-super-admin-dialog
  *ngIf="addDialogVisible()"
  [visible]="addDialogVisible()"
  (visibleChange)="addDialogVisible.set($event)"
  (added)="onAdded($event)"
></app-add-super-admin-dialog>

<app-delete-super-admin-dialog
  *ngIf="adminToDelete()"
  [admin]="adminToDelete()!"
  (deleted)="onDeleted($event)"
  (cancelled)="adminToDelete.set(null)"
></app-delete-super-admin-dialog>
