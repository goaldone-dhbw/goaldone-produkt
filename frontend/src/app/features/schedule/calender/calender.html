<div class="w-full overflow-x-auto">
  <div class="min-w-[760px] rounded-2xl bg-white">
    <full-calendar
      [options]="calendarOptions"
      [events]="calendarEvents()"
    ></full-calendar>
  </div>
</div>

<app-task-edit-dialog
  [isOpen]="isTaskDialogOpen()"
  [task]="selectedTask()"
  [allTasks]="allTaskItems()"
  mode="view"
  (isOpenChange)="isTaskDialogOpen.set($event)"
  (taskSaved)="onTaskSaved()"
></app-task-edit-dialog>
