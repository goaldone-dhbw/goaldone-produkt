<div class="flex flex-col items-center justify-center min-h-screen bg-slate-50 p-6">
  <div class="max-w-md w-full flex flex-col items-center gap-8">
    <img src="logo.png" alt="GoalDone Logo" class="w-48 h-auto" />

    <div class="text-center flex flex-col gap-4">
      <h1 class="text-3xl font-bold text-slate-800">Willkommen bei GoalDone</h1>
      <p class="text-slate-600">
        Erreiche deine Ziele mit Struktur und Leichtigkeit.
        Melde dich an, um fortzufahren.
      </p>
    </div>

    <p-button
      [label]="isLoggedIn ? 'Zur App' : 'Login'"
      (onClick)="handleAction()"
      size="large"
      class="w-full sm:w-auto"
    ></p-button>
  </div>
</div>
