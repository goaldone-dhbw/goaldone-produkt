<p-drawer [(visible)]="visible" header="goaldone">
  <div class="flex flex-col h-full overflow-hidden py-2">
    <div class="flex flex-col">
      @if (navigationItems().length > 0) {
        <p-menu [model]="navigationItems()"></p-menu>
      }
    </div>
    <div class="mt-auto">
      <p-menu [model]="settingsItems()"></p-menu>
    </div>
  </div>
</p-drawer>
