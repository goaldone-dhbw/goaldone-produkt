<div class="app-shell flex flex-col h-screen overflow-hidden">
  <header class="app-header">
    <p-button icon="pi pi-bars" [text]="true" (onClick)="toggleSidebar()" ariaLabel="Menu" />
    <p-image src="logo.png" alt="Logo" class="w-10" routerLink="/app"/>
    <span class="app-title" (click)="sidebarVisible.set(false)" routerLink="/app">Goaldone</span>
  </header>

  <app-sidebar [(visible)]="sidebarVisible"></app-sidebar>

  <main class="content-area">
    <router-outlet></router-outlet>
  </main>
</div>
