server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Internal proxy: frontend → backend via Docker network
    # BACKEND_HOST is substituted at container startup (e.g., "goaldone-backend-dev")
    location /api/v1/ {
        proxy_pass http://${BACKEND_HOST}:8080/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular SPA routing: serve index.html for any route not matching static assets
    location / {
        try_files $uri $uri/ /index.html;
    }
}
