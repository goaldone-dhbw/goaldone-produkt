name: zitadel-dev

services:
  # -------------------------------------------------------
  # ZITADEL API (Go) — handles gRPC, REST, and console (DEV)
  # -------------------------------------------------------
  zitadel-api-dev:
    image: ghcr.io/zitadel/zitadel:${ZITADEL_VERSION}
    restart: unless-stopped
    user: "0"
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY}"
    environment:
      ZITADEL_PORT: 8080
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_DOMAIN}
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALSECURE: true
      ZITADEL_TLS_ENABLED: false

      # --- Postgres connection (DEV) ---
      ZITADEL_DATABASE_POSTGRES_HOST: postgres-dev
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${POSTGRES_DB}
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_ADMIN_USER}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${POSTGRES_ZITADEL_USER}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_ZITADEL_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable

      # --- First instance bootstrap (DEV) ---
      ZITADEL_FIRSTINSTANCE_ORG_NAME: ${ZITADEL_ORG_NAME}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: ${ZITADEL_ADMIN_EMAIL}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Automatically Initialized IAM_LOGIN_CLIENT (DEV)
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: ${LOGIN_CLIENT_PAT_EXPIRATION}

      # --- Login v2 (Next.js) ---
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: true
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: https://${ZITADEL_DOMAIN}/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: https://${ZITADEL_DOMAIN}/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: https://${ZITADEL_DOMAIN}/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: https://${ZITADEL_DOMAIN}/ui/v2/login/login?samlRequest=

      # --- Access logs ---
      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: ${ZITADEL_ACCESS_LOG_STDOUT_ENABLED}

    healthcheck:
      test:
        - CMD
        - /app/zitadel
        - ready
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap-dev:/zitadel/bootstrap:rw
    networks:
      - zitadel
    depends_on:
      postgres-dev:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=zitadel

      - traefik.http.services.zitadel-api-dev.loadbalancer.server.port=8080
      - traefik.http.services.zitadel-api-dev.loadbalancer.server.scheme=h2c

      # --- HTTP → HTTPS redirect middleware (Shared from prod or defined here with -dev suffix) ---
      - traefik.http.middlewares.redirect-to-https-dev.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https-dev.redirectscheme.permanent=true

      - traefik.http.middlewares.zitadel-strip-api-dev.stripprefix.prefixes=/api

      # --- /api routes (priority 200) ---
      - traefik.http.routers.zitadel-api-alias-web-dev.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.zitadel-api-alias-web-dev.entrypoints=web
      - traefik.http.routers.zitadel-api-alias-web-dev.middlewares=redirect-to-https-dev
      - traefik.http.routers.zitadel-api-alias-web-dev.service=zitadel-api-dev
      - traefik.http.routers.zitadel-api-alias-web-dev.priority=200

      - traefik.http.routers.zitadel-api-alias-websecure-dev.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.zitadel-api-alias-websecure-dev.entrypoints=websecure
      - traefik.http.routers.zitadel-api-alias-websecure-dev.tls=true
      - traefik.http.routers.zitadel-api-alias-websecure-dev.tls.certresolver=le
      - traefik.http.routers.zitadel-api-alias-websecure-dev.middlewares=zitadel-strip-api-dev
      - traefik.http.routers.zitadel-api-alias-websecure-dev.service=zitadel-api-dev
      - traefik.http.routers.zitadel-api-alias-websecure-dev.priority=200

      # --- Catch-all for ZITADEL API (priority 100) ---
      - traefik.http.routers.zitadel-canonical-web-dev.rule=Host(`${ZITADEL_DOMAIN}`) && !PathPrefix(`/ui/v2/login`) && !PathPrefix(`/api`) && !Path(`/`)
      - traefik.http.routers.zitadel-canonical-web-dev.entrypoints=web
      - traefik.http.routers.zitadel-canonical-web-dev.middlewares=redirect-to-https-dev
      - traefik.http.routers.zitadel-canonical-web-dev.service=zitadel-api-dev
      - traefik.http.routers.zitadel-canonical-web-dev.priority=100

      - traefik.http.routers.zitadel-canonical-websecure-dev.rule=Host(`${ZITADEL_DOMAIN}`) && !PathPrefix(`/ui/v2/login`) && !PathPrefix(`/api`) && !Path(`/`)
      - traefik.http.routers.zitadel-canonical-websecure-dev.entrypoints=websecure
      - traefik.http.routers.zitadel-canonical-websecure-dev.tls=true
      - traefik.http.routers.zitadel-canonical-websecure-dev.tls.certresolver=le
      - traefik.http.routers.zitadel-canonical-websecure-dev.service=zitadel-api-dev
      - traefik.http.routers.zitadel-canonical-websecure-dev.priority=100

  # -------------------------------------------------------
  # ZITADEL Login v2 (Next.js) (DEV)
  # -------------------------------------------------------
  zitadel-login-dev:
    image: ghcr.io/zitadel/zitadel-login:${ZITADEL_VERSION}
    restart: unless-stopped
    user: "0"
    environment:
      ZITADEL_API_URL: http://zitadel-api-dev:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:${ZITADEL_DOMAIN},X-Forwarded-Proto:https
    healthcheck:
      test:
        - CMD
        - /bin/sh
        - -c
        - node /app/healthcheck.js http://localhost:3000/ui/v2/login/healthy
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap-dev:/zitadel/bootstrap:ro
    networks:
      - zitadel
    depends_on:
      zitadel-api-dev:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=zitadel
      - traefik.http.services.zitadel-login-dev.loadbalancer.server.port=3000

      - traefik.http.middlewares.zitadel-root-rewrite-dev.replacepath.path=/ui/v2/login/

      # --- Root path → login redirect (priority 400) ---
      - traefik.http.routers.zitadel-root-web-dev.rule=Host(`${ZITADEL_DOMAIN}`) && Path(`/`)
      - traefik.http.routers.zitadel-root-web-dev.entrypoints=web
      - traefik.http.routers.zitadel-root-web-dev.middlewares=redirect-to-https-dev
      - traefik.http.routers.zitadel-root-web-dev.service=zitadel-login-dev
      - traefik.http.routers.zitadel-root-web-dev.priority=400

      - traefik.http.routers.zitadel-root-websecure-dev.rule=Host(`${ZITADEL_DOMAIN}`) && Path(`/`)
      - traefik.http.routers.zitadel-root-websecure-dev.entrypoints=websecure
      - traefik.http.routers.zitadel-root-websecure-dev.tls=true
      - traefik.http.routers.zitadel-root-websecure-dev.tls.certresolver=le
      - traefik.http.routers.zitadel-root-websecure-dev.middlewares=zitadel-root-rewrite-dev
      - traefik.http.routers.zitadel-root-websecure-dev.service=zitadel-login-dev
      - traefik.http.routers.zitadel-root-websecure-dev.priority=400

      # --- /ui/v2/login routes (priority 250) ---
      - traefik.http.routers.zitadel-login-web-dev.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/ui/v2/login`)
      - traefik.http.routers.zitadel-login-web-dev.entrypoints=web
      - traefik.http.routers.zitadel-login-web-dev.middlewares=redirect-to-https-dev
      - traefik.http.routers.zitadel-login-web-dev.service=zitadel-login-dev
      - traefik.http.routers.zitadel-login-web-dev.priority=250

      - traefik.http.routers.zitadel-login-websecure-dev.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/ui/v2/login`)
      - traefik.http.routers.zitadel-login-websecure-dev.entrypoints=websecure
      - traefik.http.routers.zitadel-login-websecure-dev.tls=true
      - traefik.http.routers.zitadel-login-websecure-dev.tls.certresolver=le
      - traefik.http.routers.zitadel-login-websecure-dev.service=zitadel-login-dev
      - traefik.http.routers.zitadel-login-websecure-dev.priority=250

  # -------------------------------------------------------
  # PostgreSQL (DEV)
  # -------------------------------------------------------
  postgres-dev:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_ADMIN_USER}
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data:rw
    networks:
      - zitadel

networks:
  zitadel:
    external: true

volumes:
  postgres-data-dev:
  zitadel-bootstrap-dev:
