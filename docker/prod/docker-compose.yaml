name: goaldone-prod

networks:
  zitadel:
    external: true   # Traefik's existing network — services discovered here
  app-prod:
    name: app-prod   # Internal network for frontend↔backend communication

services:
  # PostgreSQL database for the application
  postgres-prod:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: goaldone
      POSTGRES_USER: goaldone
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    networks:
      - app-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goaldone"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot backend (not exposed publicly)
  backend-prod:
    image: ghcr.io/goaldone-dhbw/goaldone-backend:${BACKEND_VERSION}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      ZITADEL_ISSUER_URI: https://sso.goaldone.de
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-prod:5432/goaldone
      SPRING_DATASOURCE_USERNAME: goaldone
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app-prod
    depends_on:
      postgres-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Frontend - Blue slot (blue-green deployment)
  frontend-blue:
    image: ghcr.io/goaldone-dhbw/goaldone-frontend:${FRONTEND_VERSION}
    restart: unless-stopped
    environment:
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID}
      ZITADEL_ISSUER_URI: https://sso.goaldone.de
      API_BASE_PATH: /api/v1
      BACKEND_HOST: backend-prod
    networks:
      - zitadel
      - app-prod
    labels:
      - traefik.enable=${FRONTEND_BLUE_ACTIVE:-false}
      - traefik.docker.network=zitadel
      - traefik.http.routers.goaldone-frontend-prod.rule=Host(`goaldone.de`)
      - traefik.http.routers.goaldone-frontend-prod.entrypoints=websecure
      - traefik.http.routers.goaldone-frontend-prod.tls=true
      - traefik.http.routers.goaldone-frontend-prod.tls.certresolver=le
      - traefik.http.services.goaldone-frontend-prod.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend - Green slot (blue-green deployment)
  frontend-green:
    image: ghcr.io/goaldone-dhbw/goaldone-frontend:${FRONTEND_VERSION}
    restart: unless-stopped
    environment:
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID}
      ZITADEL_ISSUER_URI: https://sso.goaldone.de
      API_BASE_PATH: /api/v1
      BACKEND_HOST: backend-prod
    networks:
      - zitadel
      - app-prod
    labels:
      - traefik.enable=${FRONTEND_GREEN_ACTIVE:-false}
      - traefik.docker.network=zitadel
      - traefik.http.routers.goaldone-frontend-prod-green.rule=Host(`goaldone.de`)
      - traefik.http.routers.goaldone-frontend-prod-green.entrypoints=websecure
      - traefik.http.routers.goaldone-frontend-prod-green.tls=true
      - traefik.http.routers.goaldone-frontend-prod-green.tls.certresolver=le
      - traefik.http.services.goaldone-frontend-prod-green.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-prod-data:
