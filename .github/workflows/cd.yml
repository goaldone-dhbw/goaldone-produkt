name: CD Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump level (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write      # For creating and pushing git tags
  packages: write      # For pushing to GHCR

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for tag operations
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # ======================================================================
      # Unified versioning: find latest tag, increment based on bump type, create new tag
      # ======================================================================
      - name: Determine version
        id: version
        run: |
          # Find all version tags, sort, get the latest
          LATEST=$(git tag -l "v*" --sort=-version:refname | head -1)
          LATEST=${LATEST:-v0.0.0}
          echo "Latest tag: $LATEST"

          # Extract version number (e.g., "0.0.0" from "v0.0.0")
          VERSION=${LATEST#v}

          # Split version into parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          echo "Bumping version with: $BUMP"

          if [ "$BUMP" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" == "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"

          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push version tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      # ======================================================================
      # Update version numbers in code and commit
      # ======================================================================
      - name: Set up SSH for deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Configure git to use SSH
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Update version files
        run: |
          NEW_VER="${{ steps.version.outputs.version }}"

          # Update backend/pom.xml (replace version tag)
          sed -i "s/<version>[0-9]*\.[0-9]*\.[0-9]*-SNAPSHOT<\/version>/<version>${NEW_VER}-SNAPSHOT<\/version>/" backend/pom.xml

          # Update frontend/package.json (replace version field)
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${NEW_VER}\"/" frontend/package.json

      - name: Commit and push version updates
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
        run: |
          git add backend/pom.xml frontend/package.json
          git commit -m "chore: bump versions to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin master
          

      # ======================================================================
      # Docker setup and GHCR authentication
      # ======================================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ======================================================================
      # Build and push backend image
      # ======================================================================
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/goaldone-dhbw/goaldone-backend:${{ steps.version.outputs.version }}
            ghcr.io/goaldone-dhbw/goaldone-backend:latest

      # ======================================================================
      # Build and push frontend image
      # ======================================================================
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/goaldone-dhbw/goaldone-frontend:${{ steps.version.outputs.version }}
            ghcr.io/goaldone-dhbw/goaldone-frontend:latest

  deploy-dev:
    name: Deploy to Dev
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy dev compose and env files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: goaldone
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 6767
          source: "docker/dev/docker-compose.yaml,docker/dev/.env.example"
          target: "~/"

      - name: Copy deploy script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: goaldone
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 6767
          source: "scripts/deploy.sh"
          target: "~/docker/"

      - name: Deploy to dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: goaldone
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 6767
          envs: VERSION,GHCR_TOKEN,DEV_POSTGRES_PASSWORD,DEV_ZITADEL_CLIENT_ID
          script: |
            set -e
            mkdir -p ~/docker/dev
            chmod +x ~/docker/scripts/deploy.sh

            # Log in to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u Joinsider --password-stdin

            # Update .env if it exists, otherwise initialize from template
            if [ ! -f ~/docker/dev/.env ]; then
              cp ~/docker/dev/.env.example ~/docker/dev/.env
            fi

            # Update secrets if provided
            if [ -n "$DEV_POSTGRES_PASSWORD" ]; then
              sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD='"$DEV_POSTGRES_PASSWORD"'/' ~/docker/dev/.env
            fi

            if [ -n "$DEV_ZITADEL_CLIENT_ID" ]; then
              sed -i 's/^ZITADEL_CLIENT_ID=.*/ZITADEL_CLIENT_ID='"$DEV_ZITADEL_CLIENT_ID"'/' ~/docker/dev/.env
            fi

            # Run deployment (versions passed as arguments)
            ~/docker/scripts/deploy.sh dev $VERSION $VERSION
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEV_POSTGRES_PASSWORD: ${{ secrets.DEV_POSTGRES_PASSWORD }}
          DEV_ZITADEL_CLIENT_ID: ${{ secrets.DEV_ZITADEL_CLIENT_ID }}

  deploy-prod:
    name: Deploy to Prod
    needs: [deploy-dev, build-and-push]
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy prod compose and env files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: goaldone
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 6767
          source: "docker/prod/docker-compose.yaml,docker/prod/.env.example"
          target: "~/"

      - name: Copy deploy script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: goaldone
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 6767
          source: "scripts/deploy.sh"
          target: "~/docker/"

      - name: Deploy to prod
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: goaldone
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 6767
          envs: VERSION,GHCR_TOKEN,PROD_POSTGRES_PASSWORD,PROD_ZITADEL_CLIENT_ID
          script: |
            set -e
            mkdir -p ~/docker/prod
            chmod +x ~/docker/scripts/deploy.sh

            # Log in to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u goaldone-dhbw --password-stdin

            # Update .env if it exists, otherwise initialize from template
            if [ ! -f ~/docker/prod/.env ]; then
              cp ~/docker/prod/.env.example ~/docker/prod/.env
            fi

            # Update secrets if provided
            if [ -n "$PROD_POSTGRES_PASSWORD" ]; then
              sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD='"$PROD_POSTGRES_PASSWORD"'/' ~/docker/prod/.env
            fi

            if [ -n "$PROD_ZITADEL_CLIENT_ID" ]; then
              sed -i 's/^ZITADEL_CLIENT_ID=.*/ZITADEL_CLIENT_ID='"$PROD_ZITADEL_CLIENT_ID"'/' ~/docker/prod/.env
            fi

            # Run deployment (versions passed as arguments)
            ~/docker/scripts/deploy.sh prod $VERSION $VERSION
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          PROD_POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          PROD_ZITADEL_CLIENT_ID: ${{ secrets.PROD_ZITADEL_CLIENT_ID }}
