name: CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write      # For creating and pushing git tags
  packages: write      # For pushing to GHCR

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    outputs:
      backend_version: ${{ steps.backend-version.outputs.version }}
      frontend_version: ${{ steps.frontend-version.outputs.version }}

    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for tag operations
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # ======================================================================
      # Backend versioning: find latest tag, increment patch, create new tag
      # ======================================================================
      - name: Determine backend version
        id: backend-version
        run: |
          # Find all backend version tags, sort, get the latest
          LATEST=$(git tag -l "backend/v*" --sort=-version:refname | head -1 || echo "backend/v0.0.0")
          echo "Latest backend tag: $LATEST"

          # Extract version number (e.g., "0.0.0" from "backend/v0.0.0")
          VERSION=${LATEST#backend/v}

          # Split version into parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="backend/v$NEW_VERSION"

          echo "New backend version: $NEW_VERSION"
          echo "New backend tag: $NEW_TAG"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push backend version tag
        run: |
          git tag ${{ steps.backend-version.outputs.tag }}
          git push origin ${{ steps.backend-version.outputs.tag }}

      # ======================================================================
      # Frontend versioning: find latest tag, increment patch, create new tag
      # ======================================================================
      - name: Determine frontend version
        id: frontend-version
        run: |
          # Find all frontend version tags, sort, get the latest
          LATEST=$(git tag -l "frontend/v*" --sort=-version:refname | head -1 || echo "frontend/v0.0.0")
          echo "Latest frontend tag: $LATEST"

          # Extract version number
          VERSION=${LATEST#frontend/v}

          # Split version into parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="frontend/v$NEW_VERSION"

          echo "New frontend version: $NEW_VERSION"
          echo "New frontend tag: $NEW_TAG"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push frontend version tag
        run: |
          git tag ${{ steps.frontend-version.outputs.tag }}
          git push origin ${{ steps.frontend-version.outputs.tag }}

      # ======================================================================
      # Docker setup and GHCR authentication
      # ======================================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          password: ${{ secrets.GITHUB_TOKEN }}

      # ======================================================================
      # Build and push backend image
      # ======================================================================
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/goaldone-dhbw/goaldone-backend:${{ steps.backend-version.outputs.version }}
            ghcr.io/goaldone-dhbw/goaldone-backend:latest

      # ======================================================================
      # Build and push frontend image
      # ======================================================================
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/goaldone-dhbw/goaldone-frontend:${{ steps.frontend-version.outputs.version }}
            ghcr.io/goaldone-dhbw/goaldone-frontend:latest

  deploy-dev:
    name: Deploy to Dev
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create docker directory on VPS
        run: |
          ssh goaldone@${{ secrets.VPS_HOST }} "mkdir -p ~/docker/dev"

      - name: Copy dev docker-compose.yaml to VPS
        run: |
          scp docker/dev/docker-compose.yaml goaldone@${{ secrets.VPS_HOST }}:~/docker/dev/docker-compose.yaml
          scp docker/dev/.env.example goaldone@${{ secrets.VPS_HOST }}:~/docker/dev/.env.example.new

      - name: Copy deploy script to VPS
        run: |
          scp scripts/deploy.sh goaldone@${{ secrets.VPS_HOST }}:~/docker/deploy.sh
          ssh goaldone@${{ secrets.VPS_HOST }} "chmod +x ~/docker/deploy.sh"

      - name: Docker login on VPS and deploy
        run: |
          ssh goaldone@${{ secrets.VPS_HOST }} << 'EOF'
          set -e

          # Log in to GHCR (using GITHUB_TOKEN alternative)
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u Joinsider --password-stdin

          # Update .env if it exists, otherwise initialize from template
          if [ ! -f ~/docker/dev/.env ]; then
            cp ~/docker/dev/.env.example ~/docker/dev/.env
          fi

          # Update versions in .env
          sed -i 's/^BACKEND_VERSION=.*/BACKEND_VERSION=${{ needs.build-and-push.outputs.backend_version }}/' ~/docker/dev/.env
          sed -i 's/^FRONTEND_VERSION=.*/FRONTEND_VERSION=${{ needs.build-and-push.outputs.frontend_version }}/' ~/docker/dev/.env

          # Update secrets if provided
          if [ -n "$DEV_POSTGRES_PASSWORD" ]; then
            sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=$DEV_POSTGRES_PASSWORD/' ~/docker/dev/.env
          fi

          if [ -n "$DEV_ZITADEL_CLIENT_ID" ]; then
            sed -i 's/^ZITADEL_CLIENT_ID=.*/ZITADEL_CLIENT_ID=$DEV_ZITADEL_CLIENT_ID/' ~/docker/dev/.env
          fi

          # Run deployment
          ~/docker/deploy.sh dev ${{ needs.build-and-push.outputs.backend_version }} ${{ needs.build-and-push.outputs.frontend_version }}
          EOF
        env:
          DEV_POSTGRES_PASSWORD: ${{ secrets.DEV_POSTGRES_PASSWORD }}
          DEV_ZITADEL_CLIENT_ID: ${{ secrets.DEV_ZITADEL_CLIENT_ID }}

  deploy-prod:
    name: Deploy to Prod
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create docker directory on VPS
        run: |
          ssh goaldone@${{ secrets.VPS_HOST }} "mkdir -p ~/docker/prod"

      - name: Copy prod docker-compose.yaml to VPS
        run: |
          scp docker/prod/docker-compose.yaml goaldone@${{ secrets.VPS_HOST }}:~/docker/prod/docker-compose.yaml
          scp docker/prod/.env.example goaldone@${{ secrets.VPS_HOST }}:~/docker/prod/.env.example.new

      - name: Copy deploy script to VPS
        run: |
          scp scripts/deploy.sh goaldone@${{ secrets.VPS_HOST }}:~/docker/deploy.sh
          ssh goaldone@${{ secrets.VPS_HOST }} "chmod +x ~/docker/deploy.sh"

      - name: Docker login on VPS and deploy
        run: |
          ssh goaldone@${{ secrets.VPS_HOST }} << 'EOF'
          set -e

          # Log in to GHCR
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u goaldone-dhbw --password-stdin

          # Update .env if it exists, otherwise initialize from template
          if [ ! -f ~/docker/prod/.env ]; then
            cp ~/docker/prod/.env.example ~/docker/prod/.env
          fi

          # Update versions in .env
          sed -i 's/^BACKEND_VERSION=.*/BACKEND_VERSION=${{ needs.build-and-push.outputs.backend_version }}/' ~/docker/prod/.env
          sed -i 's/^FRONTEND_VERSION=.*/FRONTEND_VERSION=${{ needs.build-and-push.outputs.frontend_version }}/' ~/docker/prod/.env

          # Update secrets if provided
          if [ -n "$PROD_POSTGRES_PASSWORD" ]; then
            sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=$PROD_POSTGRES_PASSWORD/' ~/docker/prod/.env
          fi

          if [ -n "$PROD_ZITADEL_CLIENT_ID" ]; then
            sed -i 's/^ZITADEL_CLIENT_ID=.*/ZITADEL_CLIENT_ID=$PROD_ZITADEL_CLIENT_ID/' ~/docker/prod/.env
          fi

          # Run deployment
          ~/docker/deploy.sh prod ${{ needs.build-and-push.outputs.backend_version }} ${{ needs.build-and-push.outputs.frontend_version }}
          EOF
        env:
          PROD_POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          PROD_ZITADEL_CLIENT_ID: ${{ secrets.PROD_ZITADEL_CLIENT_ID }}
